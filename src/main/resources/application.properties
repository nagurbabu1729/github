spring.application.name=employee-api


# stop checking the static url's if the url is not matched
spring.web.resources.add-mappings=false

# springboot will handle with help of global exception handler to generate the 404 if the url not found
spring.mvc.throw-exception-if-no-handler-found=true


# spring boot will create default logs file in the logs directory with app.log file
logging.file.name=logs/app.log

logging.level.org.springframework.security=DEBUG



spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XE
spring.datasource.username=c##nagurbabu
spring.datasource.password=new_password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect